apiVersion: apps/v1
kind: Deployment
metadata:
  name: horizon-bot-homepage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: horizon-bot-homepage
  template:
    metadata:
      labels:
        app: horizon-bot-homepage
    spec:
      containers:
      - name: horizon-bot-homepage
        image: ghcr.io/horizon-tempvoice/horizon-homepage
        imagePullPolicy: Always
        env:
        - name: REDIS_HOST
          value: "redis-cache.horizon-bot.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_USERNAME
          valueFrom:
            secretKeyRef:
              name: redis-auth
              key: username
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-auth
              key: password
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: 200m
            memory: 384Mi
          requests:
            cpu: 100m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - 'response=$(curl -sf http://localhost:3000/api/guilds) && [ "$response" != "[]" ]'
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
